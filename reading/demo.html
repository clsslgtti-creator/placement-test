<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Placement Test - Demo</title>
    <link rel="stylesheet" href="../assets/css/shared.css" />
    <link rel="stylesheet" href="../assets/css/notifications.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .demo-toolbar {
        margin: 0 0 24px;
        padding: 16px;
        border: 1px solid #d7deea;
        border-radius: 14px;
        background: #f7f9fc;
      }

      .demo-toolbar h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }

      .demo-toolbar p {
        margin: 0 0 12px;
        color: #4c5a6a;
      }

      .demo-controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .demo-controls select {
        min-width: 220px;
      }

      .demo-meta {
        margin-top: 10px;
        font-size: 0.95rem;
        color: #51606f;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>PLACEMENT TEST - READING DEMO</h1>
        <p class="instructions">
          Tester mode: choose a specific reading set or keep the random live
          behavior.
        </p>
      </header>

      <section class="demo-toolbar">
        <h2>Debug Controls</h2>
        <p>Select the set testers want to inspect, then start the demo.</p>
        <div class="demo-controls">
          <label for="set-select" class="sr-only">Reading Set</label>
          <select id="set-select" class="programme-select">
            <option value="">Loading sets...</option>
          </select>
          <button id="start-demo" class="btn btn-primary">Load Demo Set</button>
        </div>
        <div id="demo-meta" class="demo-meta"></div>
      </section>

      <div class="timer">
        <i class="fas fa-clock"></i>
        Time Remaining: <span id="time-remaining">15:00</span>
      </div>
      <div class="timer-container">
        <div class="timer-bar" id="timer-bar"></div>
      </div>

      <div class="reading-container">
        <h2 id="passage-title" class="passage-title"></h2>
        <div id="passage-text" class="passage-container"></div>
        <div id="questions-container" class="questions-container"></div>
      </div>

      <div class="actions text-center">
        <button id="check-answers" class="btn btn-primary">Complete Test</button>
      </div>
    </div>

    <script src="demo-script.js"></script>
  </body>
</html>
